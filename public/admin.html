<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>adlo 管理後台</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,FILL@0..1&display=swap" rel="stylesheet"/>
<style>
  body { font-family: 'Inter', sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; vertical-align: middle; }
  .badge-new      { background:#fef3c7; color:#92400e; }
  .badge-contacted{ background:#dbeafe; color:#1d4ed8; }
  .badge-done     { background:#dcfce7; color:#166534; }
</style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

<!-- Navbar -->
<nav class="bg-slate-800 text-white px-8 py-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <span class="material-symbols-outlined text-amber-400">dashboard</span>
    <span class="font-bold text-lg tracking-tight">adlo 管理後台</span>
  </div>
  <div class="flex items-center gap-4">
    <span id="totalBadge" class="bg-amber-700 text-white text-xs font-bold px-3 py-1 rounded-full"></span>
    <a href="/" class="text-slate-300 hover:text-white text-sm transition-colors flex items-center gap-1">
      <span class="material-symbols-outlined text-base">open_in_new</span> 前台主站
    </a>
  </div>
</nav>

<!-- Toolbar -->
<div class="max-w-7xl mx-auto px-8 py-6 flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between">
  <div class="flex items-center gap-3">
    <div class="relative">
      <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg">search</span>
      <input id="searchInput" type="text" placeholder="搜尋姓名、電話、Line ID..." class="pl-10 pr-4 py-2 border border-slate-200 rounded-lg bg-white text-sm w-72 focus:outline-none focus:ring-2 focus:ring-amber-700"/>
    </div>
    <select id="statusFilter" class="border border-slate-200 rounded-lg bg-white text-sm px-3 py-2 focus:outline-none focus:ring-2 focus:ring-amber-700">
      <option value="">全部狀態</option>
      <option value="new">🟡 新申請</option>
      <option value="contacted">🔵 已聯繫</option>
      <option value="done">🟢 已完成</option>
    </select>
  </div>
  <button onclick="loadSubmissions()" class="flex items-center gap-2 bg-slate-700 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-slate-600 transition-colors">
    <span class="material-symbols-outlined text-base">refresh</span> 重新整理
  </button>
</div>

<!-- Stats Row -->
<div class="max-w-7xl mx-auto px-8 mb-6 grid grid-cols-2 sm:grid-cols-4 gap-4">
  <div class="bg-white rounded-xl border border-slate-100 p-4 shadow-sm">
    <div class="text-slate-500 text-xs mb-1 uppercase tracking-wide">全部申請</div>
    <div id="statAll" class="text-2xl font-bold text-slate-800">-</div>
  </div>
  <div class="bg-white rounded-xl border border-slate-100 p-4 shadow-sm">
    <div class="text-slate-500 text-xs mb-1 uppercase tracking-wide">新申請</div>
    <div id="statNew" class="text-2xl font-bold text-amber-700">-</div>
  </div>
  <div class="bg-white rounded-xl border border-slate-100 p-4 shadow-sm">
    <div class="text-slate-500 text-xs mb-1 uppercase tracking-wide">已聯繫</div>
    <div id="statContacted" class="text-2xl font-bold text-blue-600">-</div>
  </div>
  <div class="bg-white rounded-xl border border-slate-100 p-4 shadow-sm">
    <div class="text-slate-500 text-xs mb-1 uppercase tracking-wide">已完成</div>
    <div id="statDone" class="text-2xl font-bold text-green-600">-</div>
  </div>
</div>

<!-- Table -->
<div class="max-w-7xl mx-auto px-8 pb-16">
  <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
    <div id="loadingState" class="flex items-center justify-center py-24 text-slate-400">
      <span class="material-symbols-outlined animate-spin mr-2">progress_activity</span> 載入中...
    </div>
    <div id="emptyState" class="hidden flex-col items-center justify-center py-24 text-slate-400">
      <span class="material-symbols-outlined text-5xl mb-4">inbox</span>
      <p class="text-base font-medium">尚無申請記錄</p>
      <p class="text-sm mt-1">等候前台表單送出後即會顯示</p>
    </div>
    <table id="submissionsTable" class="hidden w-full text-sm">
      <thead>
        <tr class="bg-slate-50 border-b border-slate-100 text-xs uppercase tracking-wider text-slate-500">
          <th class="text-left px-6 py-4 font-semibold">申請時間</th>
          <th class="text-left px-6 py-4 font-semibold">姓名</th>
          <th class="text-left px-6 py-4 font-semibold">電話</th>
          <th class="text-left px-6 py-4 font-semibold">Line ID</th>
          <th class="text-left px-6 py-4 font-semibold">痛點</th>
          <th class="text-left px-6 py-4 font-semibold">狀態</th>
          <th class="text-left px-6 py-4 font-semibold">操作</th>
        </tr>
      </thead>
      <tbody id="tableBody" class="divide-y divide-slate-50"></tbody>
    </table>
  </div>
</div>

<!-- Detail Modal -->
<div id="detailModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeDetail()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8 z-10">
    <button onclick="closeDetail()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
      <span class="material-symbols-outlined">close</span>
    </button>
    <h2 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
      <span class="material-symbols-outlined text-amber-700">person</span> 申請詳情
    </h2>
    <div id="detailContent" class="space-y-4 text-sm"></div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div id="deleteModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">
  <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeDeleteModal()"></div>
  <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-sm p-8 z-10 text-center">
    <span class="material-symbols-outlined text-red-500 text-5xl mb-4 block">warning</span>
    <h3 class="text-lg font-bold text-slate-800 mb-2">確認刪除？</h3>
    <p class="text-slate-500 text-sm mb-6">此操作無法復原，申請記錄將永久刪除。</p>
    <div class="flex gap-3">
      <button onclick="closeDeleteModal()" class="flex-1 border border-slate-200 text-slate-700 font-semibold py-2 rounded-lg hover:bg-slate-50 transition-colors">取消</button>
      <button id="confirmDeleteBtn" class="flex-1 bg-red-500 text-white font-semibold py-2 rounded-lg hover:bg-red-600 transition-colors">確認刪除</button>
    </div>
  </div>
</div>

<script>
  let allData = [];
  let deleteTargetId = null;

  const statusLabel = {
    new:       { text: '新申請',  cls: 'badge-new' },
    contacted: { text: '已聯繫',  cls: 'badge-contacted' },
    done:      { text: '已完成',  cls: 'badge-done' }
  };

  function formatDate(iso) {
    const d = new Date(iso);
    return d.toLocaleString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  }

  function updateStats(data) {
    document.getElementById('statAll').textContent = data.length;
    document.getElementById('statNew').textContent = data.filter(s => s.status === 'new').length;
    document.getElementById('statContacted').textContent = data.filter(s => s.status === 'contacted').length;
    document.getElementById('statDone').textContent = data.filter(s => s.status === 'done').length;
    document.getElementById('totalBadge').textContent = `${data.filter(s=>s.status==='new').length} 筆新申請`;
  }

  function renderTable(data) {
    const tbody = document.getElementById('tableBody');
    const table = document.getElementById('submissionsTable');
    const empty = document.getElementById('emptyState');

    if (data.length === 0) {
      table.classList.add('hidden');
      empty.classList.remove('hidden');
      empty.classList.add('flex');
      return;
    }
    empty.classList.add('hidden');
    empty.classList.remove('flex');
    table.classList.remove('hidden');

    tbody.innerHTML = data.map(s => {
      const sl = statusLabel[s.status] || statusLabel.new;
      const challenges = (s.challenges || []).join('、') || '—';
      return `
        <tr class="hover:bg-slate-50 transition-colors">
          <td class="px-6 py-4 text-slate-500 whitespace-nowrap">${formatDate(s.submittedAt)}</td>
          <td class="px-6 py-4 font-semibold text-slate-800">${esc(s.name)}</td>
          <td class="px-6 py-4">
            <a href="tel:${esc(s.phone)}" class="text-amber-800 hover:underline font-mono">${esc(s.phone)}</a>
          </td>
          <td class="px-6 py-4 text-slate-600">${esc(s.lineId) || '—'}</td>
          <td class="px-6 py-4 text-slate-500 max-w-xs truncate" title="${esc(challenges)}">${esc(challenges)}</td>
          <td class="px-6 py-4">
            <select onchange="updateStatus(${s.id}, this.value)"
              class="text-xs font-semibold px-3 py-1.5 rounded-full border-0 cursor-pointer focus:outline-none focus:ring-2 focus:ring-amber-700 ${sl.cls}">
              <option value="new"       ${s.status==='new'?'selected':''}>🟡 新申請</option>
              <option value="contacted" ${s.status==='contacted'?'selected':''}>🔵 已聯繫</option>
              <option value="done"      ${s.status==='done'?'selected':''}>🟢 已完成</option>
            </select>
          </td>
          <td class="px-6 py-4">
            <div class="flex items-center gap-2">
              <button onclick="showDetail(${s.id})" title="查看詳情"
                class="text-slate-400 hover:text-slate-700 transition-colors">
                <span class="material-symbols-outlined text-xl">visibility</span>
              </button>
              <button onclick="openDeleteModal(${s.id})" title="刪除"
                class="text-slate-400 hover:text-red-500 transition-colors">
                <span class="material-symbols-outlined text-xl">delete</span>
              </button>
            </div>
          </td>
        </tr>`;
    }).join('');
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function filterData() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const statusF = document.getElementById('statusFilter').value;
    return allData.filter(s => {
      const matchQ = !q || [s.name, s.phone, s.lineId, s.website, s.notes].some(v => v && v.toLowerCase().includes(q));
      const matchS = !statusF || s.status === statusF;
      return matchQ && matchS;
    });
  }

  async function loadSubmissions() {
    document.getElementById('loadingState').classList.remove('hidden');
    document.getElementById('submissionsTable').classList.add('hidden');
    document.getElementById('emptyState').classList.add('hidden');
    try {
      const res = await fetch('/api/submissions');
      allData = await res.json();
      updateStats(allData);
      renderTable(filterData());
    } catch (e) {
      document.getElementById('loadingState').innerHTML =
        '<span class="text-red-500">⚠ 無法連線到後端伺服器，請確認 server.js 已啟動</span>';
      return;
    }
    document.getElementById('loadingState').classList.add('hidden');
  }

  async function updateStatus(id, status) {
    try {
      await fetch(`/api/submissions/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      const entry = allData.find(s => s.id === id);
      if (entry) entry.status = status;
      updateStats(allData);
    } catch (e) {
      alert('更新失敗，請重試');
    }
  }

  function showDetail(id) {
    const s = allData.find(s => s.id === id);
    if (!s) return;
    const sl = statusLabel[s.status] || statusLabel.new;
    document.getElementById('detailContent').innerHTML = `
      <div class="grid grid-cols-2 gap-4">
        <div><div class="text-slate-400 text-xs mb-1">申請編號</div><div class="font-mono font-bold text-slate-700">#${s.id}</div></div>
        <div><div class="text-slate-400 text-xs mb-1">申請時間</div><div class="font-medium">${formatDate(s.submittedAt)}</div></div>
        <div><div class="text-slate-400 text-xs mb-1">負責人姓名</div><div class="font-bold text-slate-800 text-base">${esc(s.name)}</div></div>
        <div><div class="text-slate-400 text-xs mb-1">聯絡電話</div><a href="tel:${esc(s.phone)}" class="font-bold text-amber-800 hover:underline font-mono">${esc(s.phone)}</a></div>
        <div><div class="text-slate-400 text-xs mb-1">Line ID</div><div>${esc(s.lineId) || '—'}</div></div>
        <div><div class="text-slate-400 text-xs mb-1">官網 / 地圖</div><div class="truncate">${s.website ? `<a href="${esc(s.website)}" target="_blank" class="text-blue-600 hover:underline">${esc(s.website)}</a>` : '—'}</div></div>
      </div>
      <div class="pt-2 border-t border-slate-100">
        <div class="text-slate-400 text-xs mb-2">行銷痛點</div>
        <div class="flex flex-wrap gap-2">
          ${(s.challenges||[]).length
            ? s.challenges.map(c=>`<span class="bg-amber-50 text-amber-800 border border-amber-200 text-xs font-medium px-3 py-1 rounded-full">${esc(c)}</span>`).join('')
            : '<span class="text-slate-400">未選擇</span>'}
        </div>
      </div>
      ${s.notes ? `<div class="pt-2 border-t border-slate-100"><div class="text-slate-400 text-xs mb-2">補充說明</div><div class="text-slate-700 leading-relaxed bg-slate-50 p-3 rounded-lg">${esc(s.notes)}</div></div>` : ''}
      <div class="pt-2 border-t border-slate-100">
        <div class="text-slate-400 text-xs mb-2">目前狀態</div>
        <span class="text-xs font-semibold px-3 py-1.5 rounded-full ${sl.cls}">${sl.text}</span>
      </div>`;
    document.getElementById('detailModal').classList.remove('hidden');
    document.getElementById('detailModal').classList.add('flex');
  }

  function closeDetail() {
    document.getElementById('detailModal').classList.add('hidden');
    document.getElementById('detailModal').classList.remove('flex');
  }

  function openDeleteModal(id) {
    deleteTargetId = id;
    document.getElementById('deleteModal').classList.remove('hidden');
    document.getElementById('deleteModal').classList.add('flex');
  }

  function closeDeleteModal() {
    deleteTargetId = null;
    document.getElementById('deleteModal').classList.add('hidden');
    document.getElementById('deleteModal').classList.remove('flex');
  }

  document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
    if (!deleteTargetId) return;
    try {
      await fetch(`/api/submissions/${deleteTargetId}`, { method: 'DELETE' });
      allData = allData.filter(s => s.id !== deleteTargetId);
      updateStats(allData);
      renderTable(filterData());
      closeDeleteModal();
    } catch (e) {
      alert('刪除失敗，請重試');
    }
  });

  document.getElementById('searchInput').addEventListener('input', () => renderTable(filterData()));
  document.getElementById('statusFilter').addEventListener('change', () => renderTable(filterData()));

  loadSubmissions();
  // 每 30 秒自動更新
  setInterval(loadSubmissions, 30000);
</script>
</body>
</html>
